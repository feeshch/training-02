apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend.application.test
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/feeshch/training-02.git
    path: backend
    targetRevision: HEAD
    directory:
      recurse: true
      jsonnet: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: dev02
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
